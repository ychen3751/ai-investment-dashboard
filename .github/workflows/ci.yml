name: CI

on:
  push:
    branches: [main, newOne]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npx vitest run --passWithNoTests 2>/dev/null || true

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: investor
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: investment_dashboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: pip install psycopg2-binary
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://investor:changeme@localhost:5432/investment_dashboard
          DATABASE_URL_SYNC: postgresql://investor:changeme@localhost:5432/investment_dashboard
          SECRET_KEY: test-secret-key-ci
          CORS_ORIGINS: "*"
          DEBUG: "false"
        run: pytest -v --timeout=30 -x
